<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favourites</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <main class="container page">
        <section class="hero">
            <h1 class="page-title">Favourites</h1>
            <p class="page-subtitle">
                Your saved places (stored in this browser via LocalStorage)
            </p>
        </section>

        <section>
            <h2 class="section-title">Saved essentials</h2>

            <div id="favouritesList" class="favourites-list"></div>

            <div id="emptyState" class="card empty-state">
                <p>No favourites yet.</p>
                <p>Go to Results and click "Save ★" on a place.</p>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <small>
                LocalEssentials • Static site (HTML/CSS/JS) • Uses Postcodes.io + OpenStreetMap data
            </small>
        </div>
    </footer>
    <!-- JS -->
    <script>
        fetch("header-menu.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("header-placeholder").innerHTML = data;
                document.querySelector('.nav a[href="favourites.html"]').classList.add("active");
            });
    </script>
</body>

</html>
